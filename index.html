<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Simple AR Cube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- AR.js / WebXR support -->
  <script src="https://cdn.jsdelivr.net/gh/immersive-web/webxr-polyfill@latest/build/webxr-polyfill.min.js"></script>
  <style>body { margin:0; }</style>
</head>
<body>
  <a-scene
    xrweb
    renderer="colorManagement: true; physicallyCorrectLights: true"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >
    <!-- مکعب -->
    <a-box position="0 1.5 -1" rotation="0 45 0" color="#4CC3D9" depth="0.5" height="0.5" width="0.5"
           animation="property: rotation; to: 0 405 0; loop: true; dur: 8000">
    </a-box>

    <!-- دوربین AR -->
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
