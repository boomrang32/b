<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WebXR Hand Rotate Cube (Meta Quest)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Super Hands (grab events) -->
  <script src="https://unpkg.com/super-hands/dist/super-hands.min.js"></script>
  <!-- Particle system for effects -->
  <script src="https://unpkg.com/aframe-particle-system-component/dist/aframe-particle-system-component.min.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; }
    .note {
      position: absolute; left: 10px; top: 10px; z-index: 9999;
      background: rgba(0,0,0,0.5); color: white; padding: 8px 12px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="note">Put on your Meta Quest, open Oculus Browser and visit this page. Use hands or controllers to grab the cube.</div>

  <a-scene vr-mode-ui="enabled: true" background="color: #ECECEC" embedded>
    <a-assets>
      <audio id="grabSound" src="https://cdn.jsdelivr.net/gh/aframevr/assets@master/audio/button-click.mp3"></audio>
      <audio id="releaseSound" src="https://cdn.jsdelivr.net/gh/aframevr/assets@master/audio/short-cello.mp3"></audio>
    </a-assets>

    <!-- lighting -->
    <a-entity light="type: ambient; intensity: 0.6; color: #ffffff"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="1 3 2"></a-entity>

    <!-- floor so cube has reference -->
    <a-plane rotation="-90 0 0" width="10" height="10" color="#7BC8A4" position="0 0 0"></a-plane>

    <!-- AR-like: place scene in space a bit above ground -->
    <a-entity id="room" position="0 0 -1">
      <!-- interactive cube -->
      <a-box id="cube" class="grabbable"
             position="0 1.4 -1.5"
             rotation="0 45 0"
             depth="0.5" height="0.5" width="0.5"
             color="#4CC3D9"
             shadow
             dynamic-body
             grabbable
             stretchable
             draggable
             >
        <!-- sound sources attached to cube -->
        <a-sound id="sndGrab" src="#grabSound" autoplay="false" positional="true" distanceModel="linear" maxDistance="10"></a-sound>
        <a-sound id="sndRelease" src="#releaseSound" autoplay="false" positional="true" distanceModel="linear" maxDistance="10"></a-sound>
      </a-box>

      <!-- particle system for burst effect -->
      <a-entity id="burst" particle-system="preset: dust; particleCount: 0; color: #6EF2FF, #A0FFE1; size: 0.05; maxAge: 0.8" position="0 1.4 -1.5"></a-entity>
    </a-entity>

    <!-- camera and hands/controllers -->
    <a-entity id="cameraRig" position="0 0 0">
      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>

      <!-- Right hand (hand-tracking & controller fallback) -->
      <a-entity id="rightHand"
                hand-controls="hand: right; handModelStyle: lowPoly; color: #ffcccc"
                super-hands
                oculus-touch-controls="hand: right"
                vive-controls="hand: right"
                windows-motion-controls="hand: right"
                raycaster="objects: .interactable"
                >
      </a-entity>

      <!-- Left hand -->
      <a-entity id="leftHand"
                hand-controls="hand: left; handModelStyle: lowPoly; color: #ccccff"
                super-hands
                oculus-touch-controls="hand: left"
                vive-controls="hand: left"
                windows-motion-controls="hand: left"
                raycaster="objects: .interactable"
                >
      </a-entity>
    </a-entity>

    <!-- helpers: make cube interactable by super-hands by adding 'interactable' class -->
    <a-entity id="setup"></a-entity>

    <script>
      // Make cube respond to grab events
      const cube = document.querySelector('#cube');
      const burst = document.querySelector('#burst');
      const sndGrab = document.querySelector('#sndGrab');
      const sndRelease = document.querySelector('#sndRelease');

      // super-hands emits 'grab-start' and 'grab-end' on grabbed element
      cube.addEventListener('grab-start', (evt) => {
        // play grab sound
        if (sndGrab.components && sndGrab.components.sound) sndGrab.components.sound.playSound();
        // reduce cube opacity slightly to show grab
        cube.setAttribute('material', 'opacity', 0.9);
        // attach particle burst: quick small burst
        burst.setAttribute('particle-system', 'particleCount', 40);
        setTimeout(()=>{ burst.setAttribute('particle-system', 'particleCount', 0); }, 250);
      });

      cube.addEventListener('grab-end', (evt) => {
        if (sndRelease.components && sndRelease.components.sound) sndRelease.components.sound.playSound();
        cube.setAttribute('material', 'opacity', 1.0);
        // burst different color
        burst.setAttribute('position', cube.getAttribute('position'));
        burst.setAttribute('particle-system', 'particleCount', 60);
        setTimeout(()=>{ burst.setAttribute('particle-system', 'particleCount', 0); }, 350);
      });

      // For better hand-tracking on Quest, ensure the scene requests "hand-tracking" features.
      // A-Frame will request features automatically when hand-controls are used, but we ensure XR session options:
      AFRAME.registerComponent('request-hands', {
        init: function () {
          const sceneEl = this.el;
          sceneEl.renderer.xr.enabled = true;
          // No extra code—this is placeholder to indicate we rely on built-in hand-controls
        }
      });
      document.querySelector('a-scene').setAttribute('request-hands', '');
    </script>
  </a-scene>
</body>
</html>
